name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build
        env:
          PUBLIC_GITHUB_OWNER: ${{ vars.PUBLIC_GITHUB_OWNER || 'Mamekokwai' }}
          PUBLIC_GITHUB_REPO: ${{ vars.PUBLIC_GITHUB_REPO || 'RyuChan' }}
          PUBLIC_GITHUB_BRANCH: ${{ vars.PUBLIC_GITHUB_BRANCH || 'main' }}
          PUBLIC_GITHUB_APP_ID: ${{ vars.PUBLIC_GITHUB_APP_ID || '3903517' }}
        run: |
          pnpm prefetch:music
          pnpm astro build
          pnpm pagefind --site dist

      - name: Deploy to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key" \
            dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_DEPLOY_PATH }}
